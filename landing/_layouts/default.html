<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <meta property="og:title"       content="{{ page.title | default: site.title }}" />
  <meta property="og:description" content="{{ page.description | default: site.description }}" />
  <meta property="og:image"       content="{{ '/assets/img/agenda.png' | absolute_url }}" />
  <meta property="og:url"         content="{{ page.url | absolute_url }}" />
  <meta property="og:type"        content="{% if page.layout == 'post' %}article{% else %}website{% endif %}" />
  {% if page.layout == 'post' %}
  <meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}" />
  {% for tag in page.tags %}
  <meta property="article:tag" content="{{ tag }}" />
  {% endfor %}
  {% endif %}
  <title>{{ page.title | default: site.title }}{% unless page.title == nil or page.title == site.title %} — {{ site.title }}{% endunless %}</title>
  <link rel="shortcut icon"    href="{{ '/assets/img/agenda-logo.png' | relative_url }}" type="image/png" />
  <link rel="apple-touch-icon" href="{{ '/assets/img/agenda-logo.png' | relative_url }}" />
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }} Blog" href="{{ '/feed.xml' | relative_url }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  {% seo %}
</head>
<body>
  {% include nav.html %}
  {{ content }}
  {% include footer.html %}
  <script src="{{ '/assets/js/i18n.js' | relative_url }}"></script>
</body>
</html>

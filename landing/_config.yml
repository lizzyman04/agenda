title: AGENDA
description: App mobile privado para gestão de tarefas e finanças pessoais. 100% offline. Seus dados nunca saem do dispositivo.
url: "https://agenda.omeu.space"
baseurl: ""
lang: pt-BR

author:
  name: lizzyman04
  github: https://github.com/lizzyman04/agenda
  email: arlindoabdullm@gmail.com

# Build
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:day/:title/

kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

# Sass
sass:
  sass_dir: _sass
  style: compressed

# Feed (jekyll-feed)
feed:
  path: feed.xml
  title: AGENDA Blog

# Plugins (GitHub Pages safe list)
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# SEO
twitter:
  username: lizzyman04

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - "*.sh"
  - .sass-cache
  - .jekyll-cache
